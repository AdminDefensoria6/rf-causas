<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reporte Judicial | Agente Rómulo Fioravante</title>
    
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-firestore-compat.js"></script>
    
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, sans-serif;
        }

        body {
            background: #f3f6fc;
            padding: 30px 24px;
        }

        /* Contenedor principal */
        .dashboard {
            max-width: 1400px;
            margin: 0 auto;
        }

        /* Encabezado minimal */
        .app-header {
            margin-bottom: 36px;
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            flex-wrap: wrap;
            gap: 16px;
        }

        .title-section h1 {
            font-size: 1.9rem;
            font-weight: 600;
            color: #0a2b3e;
            letter-spacing: -0.3px;
        }

        .title-section p {
            color: #4a627a;
            margin-top: 6px;
            font-size: 0.9rem;
        }

        .print-btn {
            background: white;
            border: 1px solid #cbdde9;
            padding: 10px 20px;
            border-radius: 60px;
            font-weight: 500;
            font-size: 0.85rem;
            color: #1f5e8c;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 1px 2px rgba(0,0,0,0.02);
        }

        .print-btn:hover {
            background: #eef3fc;
            border-color: #8bb3d0;
        }

        /* Grid de tarjetas (sin iconos, elegantes) */
        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 24px;
            margin-bottom: 48px;
        }

        .stat-card {
            background: white;
            border-radius: 28px;
            padding: 1.2rem 1.5rem 1.5rem 1.5rem;
            box-shadow: 0 12px 28px rgba(0, 0, 0, 0.04), 0 0 0 1px rgba(0, 0, 0, 0.02);
            transition: all 0.25s ease;
            cursor: pointer;
            position: relative;
            backdrop-filter: blur(0px);
            border: 1px solid #ffffff50;
        }

        .stat-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 32px rgba(0, 0, 0, 0.08), 0 0 0 1px #cbdde9;
            background: #ffffff;
        }

        /* Total en esquina superior derecha */
        .card-badge {
            position: absolute;
            top: 18px;
            right: 20px;
            background: #eef2ff;
            color: #1f5e8c;
            font-weight: 700;
            font-size: 1.4rem;
            padding: 4px 12px;
            border-radius: 40px;
            line-height: 1.2;
            letter-spacing: -0.5px;
            border: 1px solid #dfeaf3;
        }

        .card-title {
            font-size: 1.4rem;
            font-weight: 600;
            color: #163a5c;
            margin-top: 8px;
            margin-bottom: 12px;
            padding-right: 70px;
        }

        .card-description {
            font-size: 0.8rem;
            color: #6a7f9b;
            border-top: 1px solid #ecf3f9;
            margin-top: 24px;
            padding-top: 14px;
        }

        /* Contenedor del gráfico principal */
        .chart-panel {
            background: white;
            border-radius: 32px;
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.05);
            padding: 24px 28px 28px 28px;
            transition: all 0.2s;
            border: 1px solid #eaf0f6;
        }

        .chart-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            flex-wrap: wrap;
            margin-bottom: 24px;
            border-bottom: 2px solid #ecf3f9;
            padding-bottom: 16px;
        }

        .chart-header h3 {
            font-size: 1.5rem;
            font-weight: 600;
            color: #0e2f47;
        }

        .chart-sub {
            font-size: 0.85rem;
            color: #54809b;
            background: #f0f6fe;
            padding: 6px 14px;
            border-radius: 40px;
        }

        .chart-wrapper {
            position: relative;
            height: 420px;
            width: 100%;
        }

        .insight-note {
            margin-top: 20px;
            background: #f8fafd;
            border-radius: 20px;
            padding: 14px 20px;
            font-size: 0.85rem;
            color: #2c577a;
            text-align: center;
            border-left: 4px solid #3b82f6;
        }

        /* loading / error */
        .loader-state {
            text-align: center;
            padding: 40px;
            background: #f9fbfe;
            border-radius: 48px;
            color: #2c6288;
            font-weight: 500;
        }

        .error-message {
            background: #fff4f0;
            border-left: 4px solid #e25c3a;
            padding: 18px;
            border-radius: 20px;
            color: #b3411f;
            margin: 20px 0;
        }

        /* ocultar elementos para impresión */
        @media print {
            body {
                background: white;
                padding: 0.5cm;
            }
            .print-btn, .cards-grid .stat-card {
                break-inside: avoid;
            }
            .chart-panel {
                box-shadow: none;
                border: 1px solid #ccc;
            }
            .cards-grid {
                grid-template-columns: repeat(4,1fr);
            }
        }

        /* responsive */
        @media (max-width: 720px) {
            body {
                padding: 16px;
            }
            .chart-header h3 {
                font-size: 1.2rem;
            }
            .card-title {
                font-size: 1.2rem;
            }
            .card-badge {
                font-size: 1.1rem;
                padding: 2px 10px;
                top: 14px;
                right: 14px;
            }
        }
    </style>
</head>
<body>
<div class="dashboard">
    <div class="app-header">
        <div class="title-section">
            <h1>Reporte de Causas Asignadas</h1>
            <p>Agente Rómulo Fioravante · Datos dinámicos estadísticos</p>
        </div>
        <button class="print-btn" id="printViewBtn">🖨️ Imprimir resumen</button>
    </div>

    <!-- MÓDULOS TARJETA (sin iconos, con total en esquina superior derecha) -->
    <div class="cards-grid" id="cardsContainer">
        <!-- cada tarjeta se inyectará con JS dinámico pero estático con valores actualizados -->
    </div>

    <!-- Panel del gráfico (evolución según tarjeta seleccionada) -->
    <div class="chart-panel" id="chartPanel">
        <div class="chart-header">
            <h3 id="chartTitle">Reporte Mensual</h3>
            <div class="chart-sub" id="chartGranularityBadge">📅 Evolución mensual</div>
        </div>
        <div class="chart-wrapper">
            <canvas id="mainTimelineChart"></canvas>
        </div>
        <div class="insight-note" id="chartInsight">
            Haz clic en cualquier tarjeta para ver la evolución temporal de sus registros.
        </div>
    </div>

    <div id="loadingMessage" class="loader-state">⏳ Cargando expedientes desde Firebase ...</div>
    <div id="errorBox" class="error-message" style="display: none;"></div>
</div>

<script>
    (function() {
        // ---------- CONFIGURACIÓN FIREBASE (igual a la original) ----------
        const firebaseConfig = {
            apiKey: "AIzaSyAcylOv_wDD16HbYoTLvYj_Beaa1_MON0I",
            authDomain: "causasasignadas-def.firebaseapp.com",
            projectId: "causasasignadas-def",
            storageBucket: "causasasignadas-def.firebasestorage.app",
            messagingSenderId: "132961250045",
            appId: "1:132961250045:web:bda0f739c463217a056c94"
        };

        let app;
        try {
            app = firebase.initializeApp(firebaseConfig);
        } catch (err) {
            console.warn("Firebase ya inicializado?", err);
            app = firebase.app();
        }
        const db = firebase.firestore();

        // ---------- Variables globales ----------
        let rawExpedientes = [];          // datos crudos
        let activeCardId = 'mensual';    // 'modo', 'estado', 'semanal', 'mensual', 'anual'
        let currentChart = null;          // instancia Chart.js
        
        // contenedores
        const cardsContainer = document.getElementById('cardsContainer');
        const loadingDiv = document.getElementById('loadingMessage');
        const errorDiv = document.getElementById('errorBox');
        const chartCanvas = document.getElementById('mainTimelineChart');
        const chartTitleSpan = document.getElementById('chartTitle');
        const chartGranularitySpan = document.getElementById('chartGranularityBadge');
        const chartInsightDiv = document.getElementById('chartInsight');

        // ----- 1. Procesamiento de datos: series temporales -----
        function parseFechaDDMMYYYY(fechaStr) {
            if (!fechaStr || typeof fechaStr !== 'string') return null;
            const partes = fechaStr.split('/');
            if (partes.length !== 3) return null;
            const [dia, mes, anio] = partes;
            const fecha = new Date(`${anio}-${mes}-${dia}`);
            return isNaN(fecha.getTime()) ? null : fecha;
        }

        // Agrupar por semana (año + número de semana ISO)
        function getWeekNumber(date) {
            const d = new Date(date);
            d.setHours(0,0,0,0);
            d.setDate(d.getDate() + 3 - (d.getDay() + 6) % 7);
            const week1 = new Date(d.getFullYear(), 0, 4);
            const weekNum = 1 + Math.round(((d - week1) / 86400000 - 3 + (week1.getDay() + 6) % 7) / 7);
            return `${d.getFullYear()}-S${weekNum}`;
        }

        // generar series: semanal, mensual (año-mes), anual
        function buildTimeSeries(data, tipo) {
            // tipo: 'semanal', 'mensual', 'anual'
            const map = new Map(); // key -> count
            for (const exp of data) {
                const fechaStr = exp.fechaPase;
                if (!fechaStr) continue;
                const fecha = parseFechaDDMMYYYY(fechaStr);
                if (!fecha) continue;
                let key = '';
                if (tipo === 'semanal') {
                    key = getWeekNumber(fecha);
                } else if (tipo === 'mensual') {
                    key = `${fecha.getFullYear()}-${String(fecha.getMonth()+1).padStart(2,'0')}`;
                } else { // anual
                    key = `${fecha.getFullYear()}`;
                }
                map.set(key, (map.get(key) || 0) + 1);
            }
            // ordenar claves cronológicamente
            const sortedKeys = Array.from(map.keys()).sort((a,b) => {
                if (tipo === 'semanal') return a.localeCompare(b);
                if (tipo === 'mensual') return a.localeCompare(b);
                return parseInt(a) - parseInt(b);
            });
            const values = sortedKeys.map(k => map.get(k));
            return { labels: sortedKeys, counts: values };
        }

        // series por categoría (modo de intervención) a nivel mensual
        function buildMonthlyCategorySeries(data, categoriaKey, posiblesValores) {
            // categoriaKey: 'modoIntervencion' o 'controlSecretario'
            // Retorna: { labelsMeses: string[], datasets: [{label, data}] }
            const mesesMap = new Map(); // key "YYYY-MM" -> { categoria1: count, categoria2: count ... }
            for (const exp of data) {
                const fechaStr = exp.fechaPase;
                if (!fechaStr) continue;
                const fecha = parseFechaDDMMYYYY(fechaStr);
                if (!fecha) continue;
                const mesKey = `${fecha.getFullYear()}-${String(fecha.getMonth()+1).padStart(2,'0')}`;
                let categoria = exp[categoriaKey];
                if (!categoria || categoria === 'Sin definir') categoria = 'No especificado';
                if (!mesesMap.has(mesKey)) mesesMap.set(mesKey, {});
                const inner = mesesMap.get(mesKey);
                inner[categoria] = (inner[categoria] || 0) + 1;
            }
            // ordenar meses cronológicos
            const sortedMeses = Array.from(mesesMap.keys()).sort();
            // para cada valor posible, construir array de datos
            const datasets = [];
            for (const val of posiblesValores) {
                const dataPorMes = sortedMeses.map(mes => mesesMap.get(mes)?.[val] || 0);
                datasets.push({
                    label: val,
                    data: dataPorMes,
                    borderColor: getColorForString(val),
                    backgroundColor: 'transparent',
                    tension: 0.2,
                    fill: false,
                    borderWidth: 2.5,
                    pointRadius: 3,
                    pointHoverRadius: 6
                });
            }
            return { labels: sortedMeses, datasets };
        }

        // colores consistentes
        function getColorForString(str) {
            let hash = 0;
            for (let i = 0; i < str.length; i++) hash = ((hash<<5)-hash)+str.charCodeAt(i);
            const hue = Math.abs(hash % 360);
            return `hsl(${hue}, 65%, 55%)`;
        }

        // obtener valores únicos de un campo de los expedientes
        function getUniqueValues(data, field) {
            const vals = new Set();
            data.forEach(d => {
                let v = d[field];
                if (!v || v === 'Sin definir') v = 'No especificado';
                vals.add(v);
            });
            return Array.from(vals).sort();
        }

        // ---- Módulo de renderizado de tarjetas (dinámicas con totales) ----
        function renderCards(totalCasos) {
            const cards = [
                { id: 'modo', title: '⚖️ Modo de Intervención', desc: 'Evolución mensual por tipo de intervención', tipo: 'categorical', categoryField: 'modoIntervencion' },
                { id: 'estado', title: '⚖️ Estado de Control', desc: 'Tendencia mensual según estado del secretario', tipo: 'categorical', categoryField: 'controlSecretario' },
                { id: 'semanal', title: '📆 Reporte Semanal', desc: 'Casos por semana (evolución)', tipo: 'temporal', granularidad: 'semanal' },
                { id: 'mensual', title: '📅 Reporte Mensual', desc: 'Total de causas mes a mes', tipo: 'temporal', granularidad: 'mensual' },
                { id: 'anual', title: '🗓️ Reporte Anual', desc: 'Distribución anual de asignaciones', tipo: 'temporal', granularidad: 'anual' }
            ];
            cardsContainer.innerHTML = '';
            cards.forEach(card => {
                const cardDiv = document.createElement('div');
                cardDiv.className = 'stat-card';
                cardDiv.setAttribute('data-card-id', card.id);
                // esquina superior derecha: total de causas global (número total)
                cardDiv.innerHTML = `
                    <div class="card-badge">${totalCasos}</div>
                    <div class="card-title">${card.title}</div>
                    <div class="card-description">${card.desc}</div>
                `;
                cardDiv.addEventListener('click', (e) => {
                    e.stopPropagation();
                    activateCard(card.id, card);
                });
                cardsContainer.appendChild(cardDiv);
            });
            // resaltar primera tarjeta activa por defecto: mensual
            const defaultCard = { id: 'mensual', title: '📅 Reporte Mensual', desc: 'Total de causas mes a mes', tipo: 'temporal', granularidad: 'mensual' };
            activateCard('mensual', defaultCard);
        }

        // función principal para actualizar gráfico según tarjeta seleccionada
        function activateCard(cardId, cardMeta) {
            activeCardId = cardId;
            if (!rawExpedientes.length) return;
            const total = rawExpedientes.length;
            // actualizar estilo visual de tarjetas (opcional)
            document.querySelectorAll('.stat-card').forEach(card => {
                card.style.background = '#ffffff';
                card.style.border = '1px solid #ffffff50';
            });
            const activeDiv = document.querySelector(`.stat-card[data-card-id="${cardId}"]`);
            if(activeDiv) activeDiv.style.background = '#fafdff', activeDiv.style.border = '1px solid #bdd4e8';

            // Generar gráfico según tipo
            if (cardMeta.tipo === 'categorical') {
                const field = cardMeta.categoryField;
                let uniqueVals = getUniqueValues(rawExpedientes, field);
                if(uniqueVals.length === 0) uniqueVals = ['Sin datos'];
                const { labels, datasets } = buildMonthlyCategorySeries(rawExpedientes, field, uniqueVals);
                if (labels.length === 0) {
                    chartTitleSpan.innerText = cardMeta.title;
                    chartGranularitySpan.innerText = '📅 Sin datos temporales';
                    if (currentChart) currentChart.destroy();
                    chartInsightDiv.innerText = 'No hay fechas válidas para mostrar evolución mensual. Verifica que los expedientes contengan fechaPase.';
                    return;
                }
                chartTitleSpan.innerText = cardMeta.title;
                chartGranularitySpan.innerText = '📈 Evolución mensual por categoría';
                if (currentChart) currentChart.destroy();
                const ctx = chartCanvas.getContext('2d');
                currentChart = new Chart(ctx, {
                    type: 'line',
                    data: { labels, datasets },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: {
                            tooltip: { mode: 'index', intersect: false },
                            legend: { position: 'bottom', labels: { boxWidth: 12, font: { size: 11 } } }
                        },
                        scales: {
                            y: { beginAtZero: true, ticks: { stepSize: 1, precision:0 }, title: { display: true, text: 'Cantidad de casos' } },
                            x: { title: { display: true, text: 'Mes (Año-Mes)' }, ticks: { maxRotation: 45, autoSkip: true } }
                        }
                    }
                });
                const insights = `Distribución mensual de ${cardMeta.title.toLowerCase()}. Se muestran ${datasets.length} categorías. Total de registros: ${total}.`;
                chartInsightDiv.innerText = insights;
            } 
            else if (cardMeta.tipo === 'temporal') {
                const granularidad = cardMeta.granularidad; // 'semanal', 'mensual', 'anual'
                const { labels, counts } = buildTimeSeries(rawExpedientes, granularidad);
                if (labels.length === 0) {
                    chartTitleSpan.innerText = cardMeta.title;
                    chartGranularitySpan.innerText = `⏳ Sin registros con fecha`;
                    if (currentChart) currentChart.destroy();
                    chartInsightDiv.innerText = 'No se encontraron expedientes con fechas válidas para este reporte.';
                    return;
                }
                chartTitleSpan.innerText = cardMeta.title;
                let granularText = '';
                if (granularidad === 'semanal') granularText = '📆 Evolución semanal';
                else if (granularidad === 'mensual') granularText = '📅 Evolución mensual';
                else granularText = '🗓️ Evolución anual';
                chartGranularitySpan.innerText = granularText;
                if (currentChart) currentChart.destroy();
                const ctx = chartCanvas.getContext('2d');
                currentChart = new Chart(ctx, {
                    type: 'line',
                    data: {
                        labels: labels,
                        datasets: [{
                            label: 'Causas asignadas',
                            data: counts,
                            borderColor: '#2c6e9e',
                            backgroundColor: 'rgba(44, 110, 158, 0.05)',
                            borderWidth: 3,
                            fill: true,
                            tension: 0.2,
                            pointBackgroundColor: '#1f5e8c',
                            pointBorderColor: '#fff',
                            pointRadius: 4,
                            pointHoverRadius: 7
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: {
                            tooltip: { callbacks: { label: (ctx) => `${ctx.raw} casos` } },
                            legend: { display: false }
                        },
                        scales: {
                            y: { beginAtZero: true, ticks: { stepSize: 1, precision:0 }, title: { display: true, text: 'Número de expedientes' } },
                            x: { ticks: { maxRotation: 45, autoSkip: true }, title: { display: true, text: granularidad === 'semanal' ? 'Semana (Año-S#)' : (granularidad === 'mensual' ? 'Mes' : 'Año') } }
                        }
                    }
                });
                const totalPeriodos = labels.length;
                const maxCount = Math.max(...counts);
                chartInsightDiv.innerText = `📊 Reporte ${granularidad}: se analizan ${totalPeriodos} períodos. Pico máximo de ${maxCount} casos. Total causas: ${total}.`;
            }
        }

        // ----- Generar estadísticas rápidas para la impresión UI (modo impresión) -----
        function printSummary() {
            if (!rawExpedientes.length) {
                alert("Aún no hay datos cargados.");
                return;
            }
            const total = rawExpedientes.length;
            // Crear contenido imprimible
            const printWindow = window.open('', '_blank');
            printWindow.document.write(`
                <html>
                <head><title>Reporte oficial - Causas Rómulo Fioravante</title>
                <style>
                    body { font-family: 'Segoe UI', sans-serif; margin: 2cm; }
                    h1 { color: #0f3b5c; }
                    table { border-collapse: collapse; width: 100%; margin-bottom: 20px; }
                    th, td { border: 1px solid #ccc; padding: 8px 12px; text-align: left; }
                    th { background: #eef2f7; }
                    .badge-total { font-size: 1.8rem; font-weight: bold; color: #236b9b; }
                </style>
                </head>
                <body>
                <h1>Reporte de Causas Judiciales Asignadas</h1>
                <p>Agente Rómulo Fioravante · Generado el ${new Date().toLocaleDateString()}</p>
                <p><strong>Total de causas cargadas:</strong> ${total}</p>
                <hr/>
                <h2>Resumen por Modo de Intervención</h2>
                ${generateSimpleTable(rawExpedientes, 'modoIntervencion')}
                <h2>Estado de Control</h2>
                ${generateSimpleTable(rawExpedientes, 'controlSecretario')}
                <h2>Distribución Anual</h2>
                ${generateTimeTable(rawExpedientes, 'anual')}
                <h2>Distribución Mensual (últimos meses)</h2>
                ${generateTimeTable(rawExpedientes, 'mensual', 12)}
                <hr/>
                <footer>Sistema de análisis - Datos sincronizados desde Firebase</footer>
                </body>
                </html>
            `);
            printWindow.document.close();
            printWindow.print();
        }

        function generateSimpleTable(data, field) {
            const stats = new Map();
            data.forEach(d => {
                let val = d[field];
                if (!val || val === 'Sin definir') val = 'No especificado';
                stats.set(val, (stats.get(val) || 0) + 1);
            });
            const sorted = Array.from(stats.entries()).sort((a,b) => b[1]-a[1]);
            let html = '<table><thead><tr><th>Categoría</th><th>Cantidad</th><th>Porcentaje</th></tr></thead><tbody>';
            const total = data.length;
            sorted.forEach(([key, count]) => {
                const pct = ((count/total)*100).toFixed(1);
                html += `<tr><td>${key}</td><td>${count}</td><td>${pct}%</td></tr>`;
            });
            html += `</tbody></table>`;
            return html;
        }

        function generateTimeTable(data, tipo, maxItems = null) {
            const { labels, counts } = buildTimeSeries(data, tipo);
            let combined = labels.map((l,idx) => ({ label: l, count: counts[idx] }));
            combined.sort((a,b)=>b.count - a.count);
            if(maxItems) combined = combined.slice(0, maxItems);
            let html = '<table><thead><tr><th>Periodo</th><th>Cantidad</th></tr></thead><tbody>';
            combined.forEach( item => {
                html += `<tr><td>${item.label}</td><td>${item.count}</td></tr>`;
            });
            html += '</tbody></table>';
            return html;
        }

        // ----- Cargar datos desde Firebase -----
        async function fetchDataAndInit() {
            loadingDiv.style.display = 'block';
            errorDiv.style.display = 'none';
            try {
                const snapshot = await db.collection('expedientes').get();
                if (snapshot.empty) {
                    loadingDiv.innerHTML = '⚠️ No se encontraron expedientes en la colección "expedientes". Verifica Firestore.';
                    return;
                }
                const docs = snapshot.docs.map(doc => {
                    const data = doc.data();
                    return {
                        modoIntervencion: data.modoIntervencion || 'Sin definir',
                        controlSecretario: data.controlSecretario || 'Sin estado',
                        fechaPase: data.fechaPase || null,
                        fechaControl: data.fechaControl || null
                    };
                });
                rawExpedientes = docs;
                loadingDiv.style.display = 'none';
                const totalCasos = rawExpedientes.length;
                // Renderizar tarjetas con total real
                renderCards(totalCasos);
                // Forzar activar por defecto: reporte mensual 
                const defaultCardMeta = { id: 'mensual', title: '📅 Reporte Mensual', desc: 'Total de causas mes a mes', tipo: 'temporal', granularidad: 'mensual' };
                activateCard('mensual', defaultCardMeta);
            } catch (err) {
                console.error(err);
                loadingDiv.style.display = 'none';
                errorDiv.style.display = 'block';
                errorDiv.innerText = `Error al conectar con Firebase: ${err.message}. Verifica tu conexión y reglas de Firestore.`;
            }
        }

        // botón imprimir
        document.getElementById('printViewBtn').addEventListener('click', () => {
            if(rawExpedientes.length) printSummary();
            else alert("Esperando carga de datos...");
        });

        fetchDataAndInit();
    })();
</script>
</body>
</html>
